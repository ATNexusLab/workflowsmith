name: Bug
description: Report a defect in WorkflowSmith docs, governance, validation, or future distributions.
title: "Bug: "
labels:
  - type:bug
  - target:0.0.0
projects:
  - ATNexusLab/11
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add commands, output, links, or affected files.
    validations:
      required: false
